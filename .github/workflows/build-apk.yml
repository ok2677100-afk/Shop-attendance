name: Build Shop Attendance APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout your code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Android Gradle) ───────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies (Capacitor + plugins) ─────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Add Android platform (creates the android/ folder) ─────────
      - name: Add Android platform
        run: npx cap add android

      # ── 6. Sync web assets into android/ ──────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 7. Patch AndroidManifest — add required permissions ───────────
      - name: Patch AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Insert permissions before the <application> tag if not already present
          if ! grep -q "ACCESS_WIFI_STATE" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <uses-permission android:name="android.permission.USE_FINGERPRINT"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
          fi
          echo "✅ Permissions patched"
          cat "$MANIFEST"

      # ── 8. Make Gradle wrapper executable ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build debug APK ────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 10. Upload APK as artifact ────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShopAttendance-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Print success message ─────────────────────────────────────
      - name: Done
        run: |
          echo "✅ APK built successfully!"
          echo "📦 Download it from the Actions tab → this workflow run → Artifacts section"
